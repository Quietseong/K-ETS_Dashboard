services:
  streamlit:
    build: .
    container_name: k-ets-streamlit
    command: >
      streamlit run main.py
      --server.port=8501
      --server.address=0.0.0.0
      --server.headless=true
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  fastapi:
    build: .
    container_name: k-ets-fastapi
    command: python app_api.py
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
